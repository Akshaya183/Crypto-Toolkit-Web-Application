<!DOCTYPE html>
<html>
<head>
    <title>RC4 Cipher</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="header">RC4 Cipher</div>

<div class="container">

    <!-- LEFT -->
    <div class="card">
        <input type="text" id="text" placeholder="Enter text">
        <input type="text" id="key" placeholder="Enter key">

        <button onclick="process()">Encrypt / Decrypt</button>
    </div>

    <!-- RIGHT -->
    <div class="card">
        <h3>Output</h3>
        <div id="result"></div>
    </div>

</div>

<script src="js/rc4.js"></script>

</body>
</html>
